<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynasty 8 | Chase Walton Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --dorado: #d4bc3b; --negro: #121212; --blanco: #ffffff; --discord: #5865F2; --gris: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--blanco); color: var(--negro); line-height: 1.6; }

        /* NAVEGACIÓN */
        nav { background: var(--negro); border-bottom: 4px solid var(--dorado); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Oswald', sans-serif; color: white; font-size: 1.8rem; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--dorado); }
        nav ul { display: flex; list-style: none; gap: 20px; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }

        /* HERO */
        .hero { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=1400'); background-size: cover; background-position: center; height: 400px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .hero h1 { font-family: 'Oswald', sans-serif; font-size: 4rem; margin-bottom: 5px; }
        .hero p { color: var(--dorado); letter-spacing: 5px; text-transform: uppercase; font-size: 1.2rem; }

        /* CONTENEDOR */
        .container { padding: 60px 5%; max-width: 1300px; margin: auto; }
        .section-title { font-family: 'Oswald', sans-serif; font-size: 2.5rem; text-align: center; margin-bottom: 40px; text-transform: uppercase; position: relative; padding-bottom: 10px; }
        .section-title::after { content: ''; width: 60px; height: 3px; background: var(--dorado); position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); }

        /* PROPIEDADES DESTACADAS (GRANDES) */
        .featured-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; margin-bottom: 80px; }
        .featured-card { position: relative; height: 400px; border-radius: 15px; overflow: hidden; cursor: pointer; border: 2px solid var(--dorado); transition: 0.4s; }
        .featured-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .featured-card:hover img { transform: scale(1.1); }
        .featured-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; }
        .featured-overlay h3 { font-family: 'Oswald', sans-serif; font-size: 2rem; }
        .badge-destacado { position: absolute; top: 20px; right: 20px; background: var(--dorado); color: black; padding: 5px 15px; font-weight: bold; border-radius: 5px; font-size: 0.8rem; }

        /* PROPIEDADES NORMALES */
        .property-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #eee; position: relative; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-body h3 { font-family: 'Oswald', sans-serif; font-size: 1.3rem; margin-bottom: 10px; }
        .price-tag { color: var(--dorado); font-weight: bold; font-size: 1.2rem; font-family: 'Oswald', sans-serif; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: white; max-width: 900px; margin: 40px auto; border-radius: 15px; overflow: hidden; position: relative; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close { position: absolute; top: 20px; right: 25px; color: white; font-size: 40px; cursor: pointer; z-index: 3000; }
        
        .carousel { width: 100%; height: 450px; background: #000; position: relative; }
        .slide { width: 100%; height: 100%; object-fit: cover; display: none; }
        .slide.active { display: block; }
        .car-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 15px; cursor: pointer; }
        .next { right: 0; }

        .details { padding: 40px; }
        .tax-box { background: #f9f9f9; padding: 20px; border-left: 5px solid var(--dorado); margin: 20px 0; border-radius: 5px; }
        .tax-row { display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; padding: 10px 0; }
        .tax-row.total { border: none; font-size: 1.8rem; color: var(--dorado); font-weight: bold; font-family: 'Oswald', sans-serif; }
        .btn-discord { display: block; text-align: center; background: var(--discord); color: white; padding: 15px; text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 20px; }

        footer { background: var(--negro); color: #555; text-align: center; padding: 50px; border-top: 4px solid var(--dorado); }
    </style>
</head>
<body>

<nav>
    <div class="logo">DYNASTY <span>8</span></div>
    <ul>
        <li><a href="#destacadas">Destacadas</a></li>
        <li><a href="#catalogo">Catálogo</a></li>
    </ul>
</nav>

<header class="hero">
    <h1>DYNASTY 8</h1>
    <p>CHASE WALTON | PROYECTO HOODSIDE</p>
</header>

<div class="container">
    <h2 class="section-title" id="destacadas">Propiedades Premium</h2>
    <div class="featured-grid" id="grid-destacadas"></div>

    <h2 class="section-title" id="catalogo">Inventario General</h2>
    <div class="property-grid" id="grid-general"></div>
</div>

<div id="modalCasa" class="modal">
    <span class="close" onclick="cerrarModal()">&times;</span>
    <div class="modal-content" id="modal-content"></div>
</div>

<footer>
    <p>&copy; 2026 Dynasty 8 - Gestión de Activos e Inversiones Chase Walton</p>
</footer>

<script>
/* ===========================================================
   BASE DE DATOS INTEGRAL
   =========================================================== */
const DATA = [
    {
        id: 1,
        nombre: "Mansión Eclipse Penthouse",
        destacada: true,
        precio: 2500000, tax: 200000, honor: 75000,
        desc: "La joya de la corona. Ubicada en la planta más alta de Eclipse Towers, ofrece vistas 360 de Los Santos, helipuerto privado y acabados en mármol italiano.",
        fotos: ["https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1000", "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1000"]
    },
    {
        id: 2,
        nombre: "Villa Moderna Rockford Hills",
        destacada: true,
        precio: 3200000, tax: 256000, honor: 96000,
        desc: "Arquitectura minimalista. Gran piscina exterior, garaje para 12 vehículos y sistema de domótica controlable desde el móvil.",
        fotos: ["https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=1000", "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=1000"]
    },
    {
        id: 3,
        nombre: "Apartamento Del Perro",
        destacada: false,
        precio: 850000, tax: 68000, honor: 25500,
        desc: "Ideal para disfrutar del estilo de vida costero. Cerca de la playa y de los mejores locales de ocio nocturno.",
        fotos: ["https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=1000"]
    },
    {
        id: 4,
        nombre: "Piso Programa Social (VPO)",
        destacada: false,
        precio: 135000, tax: 10800, honor: 0,
        desc: "Vivienda protegida bajo el programa de ayuda al ciudadano. Requisitos de renta mínima exigidos.",
        fotos: ["https://images.unsplash.com/photo-1460317442991-0ec209397118?w=1000"]
    }
];

// Lógica de Renderizado
const gridDest = document.getElementById('grid-destacadas');
const gridGen = document.getElementById('grid-general');

DATA.forEach(p => {
    const total = p.precio + p.tax + p.honor;
    if(p.destacada) {
        gridDest.innerHTML += `
            <div class="featured-card" onclick="abrirModal(${p.id})">
                <div class="badge-destacado">PREMIUM</div>
                <img src="${p.fotos[0]}">
                <div class="featured-overlay">
                    <h3>${p.nombre}</h3>
                    <p style="color:var(--dorado); font-weight:bold; font-size:1.5rem;">${total.toLocaleString()} €</p>
                </div>
            </div>`;
    } else {
        gridGen.innerHTML += `
            <div class="card" onclick="abrirModal(${p.id})">
                <img src="${p.fotos[0]}">
                <div class="card-body">
                    <h3>${p.nombre}</h3>
                    <p class="price-tag">${total.toLocaleString()} €</p>
                </div>
            </div>`;
    }
});

let slideIdx = 0;
function abrirModal(id) {
    const p = DATA.find(i => i.id === id);
    slideIdx = 0;
    const total = p.precio + p.tax + p.honor;

    document.getElementById('modal-content').innerHTML = `
        <div class="carousel">
            ${p.fotos.map((f, i) => `<img src="${f}" class="slide ${i===0?'active':''}">`).join('')}
            <button class="car-btn" onclick="mover(-1)">&#10094;</button>
            <button class="car-btn next" onclick="mover(1)">&#10095;</button>
        </div>
        <div class="details">
            <h2 style="font-family:'Oswald'">${p.nombre}</h2>
            <p>${p.desc}</p>
            <div class="tax-box">
                <div class="tax-row"><span>Tasación Base:</span><span>${p.precio.toLocaleString()} €</span></div>
                <div class="tax-row"><span>Impuestos (IVC):</span><span>${p.tax.toLocaleString()} €</span></div>
                <div class="tax-row"><span>Gestión Dynasty 8:</span><span>${p.honor.toLocaleString()} €</span></div>
                <div class="tax-row total"><span>TOTAL:</span><span>${total.toLocaleString()} €</span></div>
            </div>
            <a href="https://discord.gg/TU_LINK" class="btn-discord" target="_blank">SOLICITAR CITA (TICKET)</a>
        </div>`;
    document.getElementById('modalCasa').style.display = "block";
    document.body.style.overflow = "hidden";
}

function cerrarModal() {
    document.getElementById('modalCasa').style.display = "none";
    document.body.style.overflow = "auto";
}

function mover(n) {
    const s = document.querySelectorAll('.slide');
    s[slideIdx].classList.remove('active');
    slideIdx = (slideIdx + n + s.length) % s.length;
    s[slideIdx].classList.add('active');
}

window.onclick = (e) => { if(e.target == document.getElementById('modalCasa')) cerrarModal(); }
</script>
</body>
</html>
