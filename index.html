<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynasty 8 | Inmobiliaria</title>
    <style>
        :root { --dorado: #d4bc3b; --negro: #000000; --blanco: #ffffff; --discord: #5865F2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }
        body { background: var(--blanco); color: var(--negro); }
        nav { background: var(--negro); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--dorado); }
        .logo-txt { color: white; font-size: 1.5rem; font-weight: bold; }
        .logo-txt span { color: var(--dorado); }
        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 20px; }
        nav ul li a { color: var(--blanco); text-decoration: none; font-size: 0.9rem; font-weight: bold; }
        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=1400'); background-size: cover; height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .container { padding: 50px 5%; }
        h2 { text-align: center; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .card { border: 1px solid #eee; border-radius: 10px; overflow: hidden; transition: 0.3s; background: white; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        .tag { background: var(--negro); color: var(--dorado); padding: 3px 8px; font-size: 0.7rem; border-radius: 3px; font-weight: bold; }
        .precio { color: var(--dorado); font-weight: bold; font-size: 1.2rem; margin: 10px 0; }
        .btn-discord { position: fixed; bottom: 20px; right: 20px; background: var(--discord); color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 999; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .agente-item { text-align: center; padding: 20px; background: #f9f9f9; border-radius: 10px; border-top: 3px solid var(--dorado); }
        footer { background: var(--negro); color: white; text-align: center; padding: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav>
    <div class="logo-txt">DYNASTY <span>8</span></div>
    <ul>
        <li><a href="#propiedades">Propiedades</a></li>
        <li><a href="#agentes">Agentes</a></li>
    </ul>
</nav>

<header class="hero">
    <h1 id="main-title">Dynasty 8</h1>
    <p id="main-subtitle">Cargando información...</p>
</header>

<section class="container" id="propiedades">
    <h2>Catálogo Inmobiliario</h2>
    <div class="grid" id="grid-propiedades"></div>

    <h2 id="agentes">Nuestros Agentes</h2>
    <div class="grid" id="grid-agentes"></div>
</section>

<a href="#" id="discord-link" class="btn-discord" target="_blank">👾 Entrar al Discord</a>

<footer>
    <p>&copy; 2026 Dynasty 8 - Todos los derechos reservados</p>
</footer>

<script>
// ==========================================
//   CENTRAL DE CONTROL (EDITA AQUÍ ABAJO)
// ==========================================

const CONFIG = {
    tituloPrincipal: "Dynasty 8 Inmobiliaria",
    subtitulo: "Venta, Alquiler, Opción a Compra y VPO",
    enlaceDiscord: "https://discord.gg/TU_INVITACION", // <--- TU LINK AQUÍ
};

const AGENTES = [
    { nombre: "Chase Walton", cargo: "CEO de Dynasty 8" },
    { nombre: "Agente Nombre 2", cargo: "Gestión de Alquileres" },
    { nombre: "Agente Nombre 3", cargo: "Asesor VPO" }
];

const PROPIEDADES = [
    {
        titulo: "Mansión Lujosa",
        tipo: "VENTA",
        precio: "1.500.000 €",
        foto: "https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=500"
    },
    {
        titulo: "Apartamento Moderno",
        tipo: "ALQUILER",
        precio: "1.200 €/mes",
        foto: "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=500"
    },
    {
        titulo: "Casa con Opción a Compra",
        tipo: "ALQUILER + OPCIÓN",
        precio: "900 €/mes",
        foto: "https://images.unsplash.com/photo-1580587767073-45237f06222b?w=500"
    },
    {
        titulo: "Piso Planta Baja VPO",
        tipo: "VPO",
        precio: "140.000 €",
        foto: "https://images.unsplash.com/photo-1460317442991-0ec209397118?w=500"
    }
];

// ==========================================
//   LÓGICA AUTOMÁTICA (NO TOCAR)
// ==========================================

document.getElementById('main-title').innerText = CONFIG.tituloPrincipal;
document.getElementById('main-subtitle').innerText = CONFIG.subtitulo;
document.getElementById('discord-link').href = CONFIG.enlaceDiscord;

const gridProp = document.getElementById('grid-propiedades');
PROPIEDADES.forEach(p => {
    gridProp.innerHTML += `
        <div class="card">
            <img src="${p.foto}" alt="${p.titulo}">
            <div class="card-body">
                <span class="tag">${p.tipo}</span>
                <h3 style="margin-top:10px">${p.titulo}</h3>
                <p class="precio">${p.precio}</p>
                <a href="${CONFIG.enlaceDiscord}" target="_blank" style="color:var(--discord); text-decoration:none; font-size:0.8rem; font-weight:bold;">MÁS INFO EN DISCORD →</a>
            </div>
        </div>
    `;
});

const gridAge = document.getElementById('grid-agentes');
AGENTES.forEach(a => {
    gridAge.innerHTML += `
        <div class="agente-item">
            <h3>${a.nombre}</h3>
            <p style="color:#666">${a.cargo}</p>
        </div>
    `;
});
</script>
</body>
</html>
